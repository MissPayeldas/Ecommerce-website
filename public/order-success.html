<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success</title>
    <style>
        .container { max-width: 800px; margin: 50px auto; padding: 20px; text-align: center; }
        .success-icon { font-size: 50px; color: #28a745; }
        .order-details { text-align: left; margin: 30px 0; padding: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>Order Placed Successfully!</h1>
        
        <div class="order-details">
            <h2>Order Summary</h2>
            <p id="orderItems"></p>
            <p><strong>Total Amount:</strong> ₹<span id="orderTotal"></span></p>
            <p><strong>Payment Method:</strong> <span id="paymentMethod"></span></p>
        </div>

        <p>Thank you for your purchase!</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const paymentMethod = urlParams.get('payment');
            
            // Display payment method
            document.getElementById('paymentMethod').textContent = paymentMethod.toUpperCase();
            
            // Retrieve and display total amount
            const totalAmount = localStorage.getItem('cartTotal') || '0';
            document.getElementById('orderTotal').textContent = totalAmount;

            // Retrieve and display cart items
            const cartItems = JSON.parse(localStorage.getItem('cartItems') || '[]');
            document.getElementById('orderItems').innerHTML = cartItems
                .map(item => `${item.name} - ₹${item.price}<br>`)
                .join('');
        });
    </script>
</body>
</html>
